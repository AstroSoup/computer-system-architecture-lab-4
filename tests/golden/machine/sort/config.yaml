memory_size: 1024
limit: 4096
devices:
  - in: [5, 4, 3, 2, 9, 8]
    out: []
report:
  - type: "first"
    view: |
      tick | mnemonic
      -------------------------------------------------
  - type: "step-by-step"
    view: |
      {tick} | {mnemonic}
  - type: "last"
    view: |
      -------------------------------------------------
      Program executed after {tick} ticks. Final state:
      in: 
      {in(0)}
      out: 
      {out(0)}
      memory_dump:
      {memory(0:320:16)}
