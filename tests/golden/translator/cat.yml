sources: |
  .data
  .org 0x196
  len: .word 0
  
  .text
  .org 0x200
  _start:
      in $0
      bzs exit
  
      st.w len
  
      loop:
          in $0
          out $0
  
          ld.w len
          dec
          st.w len
          
          bzns loop
  
      exit:
          halt

bin_out: !!binary |
  YA3K/gAAAgAAAAGWAAAABAAAAgAAAAAouq3K/gAAAAASgAAAFYAAHAf//4oSgAAAE4AAAAP//34C
  gAAAB///dhb//+gAgAAA
translator_debug: |
  <address> | <hex_code> | <mnemonic>                      
  512       | 0x12800000 | in: device(0) -> acc            
  516       | 0x1580001c | bzs: if (z == 1) pc + 28 -> pc  
  520       | 0x07ffff8a | st.w: acc -> mem(pc + -118)     
  524       | 0x12800000 | in: device(0) -> acc            
  528       | 0x13800000 | out: acc -> device(0)           
  532       | 0x03ffff7e | ld.w: mem(pc + -130) -> acc     
  536       | 0x02800000 | dec: acc - 1 -> acc             
  540       | 0x07ffff76 | st.w: acc -> mem(pc + -138)     
  544       | 0x16ffffe8 | bzns: if (z == 0) pc + -24 -> pc
  548       | 0x00800000 | halt: halt execution            
