sources: |
  .data
  .org 0x00
  hello: .word 11
  .byte "hello world"
  ptr: .word 0
  
  .text
  _start:
      ld.w #hello ; Loading an address through immedeate value operator used with label
      add #4
      st.w ptr ; storing address of start of the string in ptr
  
      loop:
          ld.b (ptr) ; loading char
          out $0; output char to device 0
          ld.w ptr
          inc
          st.w ptr
          sub #4
          sub hello
          bzns loop ; loop until string length is zero
  
  .text
      halt

bin_out: !!binary |
  YA3K/gAAABMAAAAAAAAAEwAAABMAAAAsAAAAPwAAAAS6rcr+AAAAC2hlbGxvIHdvcmxkAAAAAAMA
  AAAKgAAEB///8AcAAA8TgAAAA///5AIAAAAH///cDIAABA1//8UW///gAIAAAA==
translator_debug: |
  <address> | <hex_code> | <mnemonic>                      
  19        | 0x03000000 | ld.w: 0 -> acc                  
  23        | 0x0a800004 | add: 4 + acc -> acc             
  27        | 0x07fffff0 | st.w: acc -> mem(pc + -16)      
  31        | 0x0700000f | ld.b: mem(mem(15)) -> acc       
  35        | 0x13800000 | out: acc -> device(0)           
  39        | 0x03ffffe4 | ld.w: mem(pc + -28) -> acc      
  43        | 0x02000000 | inc: acc + 1 -> acc             
  47        | 0x07ffffdc | st.w: acc -> mem(pc + -36)      
  51        | 0x0c800004 | sub: acc - 4 -> acc             
  55        | 0x0d7fffc5 | sub: acc - mem(pc + -59) -> acc 
  59        | 0x16ffffe0 | bzns: if (z == 0) pc + -32 -> pc
  63        | 0x00800000 | halt: halt execution            
